<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>公众号排版助手 Pro</title>
<style>
:root{--bg:#f5f5f5;--card:#fff;--text:#1a1a1a;--muted:#999;--border:#e8e8e8;--accent:#1a1a1a}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;max-width:500px;margin:0 auto;overflow:hidden}
.hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--card);z-index:10;flex-shrink:0}
.hdr h1{font-size:16px;font-weight:700}
.hdr .actions{display:flex;gap:4px}
.hdr .act{width:32px;height:32px;border-radius:8px;border:none;background:transparent;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:.15s}
.hdr .act:active{background:#f0f0f0}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;font-size:13px;color:var(--muted);white-space:nowrap;border-bottom:2px solid transparent;cursor:pointer;transition:.15s;flex-shrink:0}
.tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:600}
.panel{display:none;flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.panel.active{display:block}
#editor{width:100%;min-height:200px;border:none;outline:none;font-size:15px;line-height:1.8;font-family:inherit;resize:none;background:transparent;color:var(--text);padding:0}
#editor::placeholder{color:#ccc}
.toolbar{display:flex;gap:4px;padding-bottom:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:10px}
.toolbar button{padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);font-size:11px;cursor:pointer;color:var(--text);white-space:nowrap;transition:.15s;-webkit-tap-highlight-color:transparent}
.toolbar button:active{background:#f0f0f0}
.toolbar .tb-sep{width:1px;background:var(--border);margin:2px 2px}
.toolbar .tb-module{color:#07c160;border-color:#b7ebc8}
.style-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.style-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent}
.style-card:active{background:#fafafa}
.style-card .s-preview{font-size:10px;line-height:1.4;color:var(--muted);margin-bottom:4px;overflow:hidden;max-height:42px}
.style-card .s-name{font-size:12px;font-weight:600}
.section-label{font-size:12px;font-weight:600;color:var(--muted);padding:10px 0 6px}
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.theme-card{background:var(--card);border:2px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent}
.theme-card.selected{border-color:var(--accent)}
.theme-card .t-bar{height:4px;display:flex}
.theme-card .t-bar span{flex:1}
.theme-card .t-body{padding:10px 12px;font-size:11px;line-height:1.5}
.theme-card .t-body b{font-size:13px;display:block;margin-bottom:2px}
.img-actions{display:flex;gap:6px;padding-bottom:12px}
.img-actions button{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:12px;cursor:pointer;font-weight:500;transition:.15s;-webkit-tap-highlight-color:transparent}
.img-actions button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.img-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.img-item{aspect-ratio:4/3;border-radius:8px;border:2px solid var(--border);cursor:pointer;background-size:cover;background-position:center;transition:.15s;overflow:hidden;display:flex;align-items:flex-end;position:relative}
.img-item.selected{border-color:var(--accent)}
.img-item .img-label{width:100%;background:rgba(0,0,0,.5);color:#fff;font-size:9px;padding:3px 6px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.img-item .del-btn{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:10px;background:rgba(0,0,0,.4);color:#fff;border:none;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.img-item:active .del-btn{display:flex}
.img-item.loading{display:flex;align-items:center;justify-content:center;background:#f8f8f8}
.spinner{width:22px;height:22px;border:2px solid #e0e0e0;border-top-color:var(--accent);border-radius:11px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.draft-item{background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border);cursor:pointer;transition:.15s;position:relative}
.draft-item:active{background:#fafafa}
.draft-item .d-title{font-size:14px;font-weight:600;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.draft-item .d-meta{font-size:11px;color:var(--muted);display:flex;gap:8px}
.draft-item .d-del{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:11px;border:none;background:#f0f0f0;cursor:pointer;font-size:12px;color:var(--muted);display:flex;align-items:center;justify-content:center}
#preview-wrap{background:var(--card);border-radius:12px;padding:20px 16px;min-height:60vh;word-break:break-word}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-sheet{background:var(--card);width:100%;max-width:500px;margin:0 auto;border-radius:16px 16px 0 0;max-height:70vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-head{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:15px;display:flex;justify-content:space-between;align-items:center}
.modal-head button{width:28px;height:28px;border-radius:14px;border:none;background:#f2f2f2;font-size:14px;cursor:pointer}
.modal-body{padding:14px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.82);color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.toast.show{opacity:1}
.settings-section{margin-bottom:14px}
.settings-section label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--muted)}
.settings-section input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);font-size:14px;font-family:monospace;outline:none;background:var(--card)}
.settings-section input:focus{border-color:var(--accent)}
.settings-section .hint{font-size:11px;color:var(--muted);margin-top:4px}
.proxy-status{padding:8px 12px;border-radius:8px;font-size:12px;margin-top:8px}
.proxy-status.ok{background:#e8f5e9;color:#2e7d32}
.proxy-status.off{background:#fef0f0;color:#c62828}
.btn-publish{width:100%;padding:12px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn-publish.ready{background:#07c160;color:#fff}
.btn-publish.off{background:#f0f0f0;color:#999}
.btn-publish:active{opacity:.8}
.btn-publish:disabled{opacity:.4;pointer-events:none}
</style>
</head>

  <div class="tab" data-p="draft">草稿</div>
  <div class="tab" data-p="preview">预览</div>
</div>

<div class="panel active" id="panel-edit">

空行自动分段
选中文字点击上方按钮插入样式
::: 容器模块语法支持

<div class="panel" id="panel-theme">

<div class="panel" id="panel-img">

  <div class="img-grid" id="img-grid"></div>

<div class="panel" id="panel-draft">

  <div id="draft-list"></div>
</div>

<div class="panel" id="panel-preview">
  <div id="preview-wrap"></div>
  <button class="btn-copy" style="width:100%;padding:14px;margin-top:16px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer">复制到公众号后台</button>
</div>

<div class="modal-overlay" id="modal">

    <div class="modal-head"><span id="modal-title"></span><button id="modal-close">&times;</button></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<input type="file" accept="image/*" multiple id="file-input" style="display:none">

  // ==================== WeChat Compatibility Fixes ====================
  function fixCJKSpacing(html){
    return html.replace(/([\u4e00-\u9fff\u3000-\u303f])([a-zA-Z0-9])/g,'$1 $2')
      .replace(/([a-zA-Z0-9])([\u4e00-\u9fff\u3000-\u303f])/g,'$1 $2');
  }

  function fixBoldPunctuation(html){
    return html.replace(/<strong>([^<]*)([，。！？；：、】》」』）\)\}])<\/strong>/g,'<strong>$1</strong>$2')
      .replace(/<b>([^<]*)([，。！？；：、】》」』）\)\}])<\/b>/g,'<b>$1</b>$2');
  }

  function convertListsToSections(html){
    // Replace <ul> with styled sections (WeChat renders native lists unreliably)
    html=html.replace(/<ul style="([^"]*)">(.*?)<\/ul>/gs,function(m,style,content){
      return '<section style="'+style+'">'+content+'</section>';
    });
    // Keep <li> but add dot prefix
    html=html.replace(/<li style="([^"]*)">/g,'<p style="$1">• ');
    html=html.replace(/<\/li>/g,'</p>');
    return html;
  }

  function convertLinksToFootnotes(html){
    var links=[];
    // Find all <a> tags
    html=html.replace(/<a [^>]*href="([^"]*)"[^>]*>([^<]*)<\/a>/g,function(m,href,text){
      if(href.startsWith('#')||href.startsWith('javascript:'))return m;
      links.push(href);
      var idx=links.length;
      return text+'<sup>['+idx+']</sup>';
    });
    if(links.length>0){
      html+='<hr style="border:none;border-top:1px solid #e0e0e0;margin:30px 0">';
      html+='<p style="font-size:13px;color:#999">参考链接：</p>';
      links.forEach(function(l,i){html+='<p style="font-size:12px;color:#aab">['+(i+1)+'] '+escHtml(l)+'</p>'});
    }
    return html;
  }

  function injectDarkMode(html,theme){
    if(!theme.dkBg)return html;
    // Add dark mode support via data-darkmode attributes
    return html.replace(/<section/g,'<section data-darkmode-bg="'+theme.dkBg+'"')
      .replace(/style="background:([^;"]*)/g,'style="background:$1" data-darkmode-bg="$1"');
  }

          '<div style="flex:1;background:'+theme.accent+';border-radius:12px 12px 4px 12px;padding:10px 14px;font-size:14px;color:#fff;margin-left:8px">'+l+'</div>'+
          '<div style="width:32px;height:32px;border-radius:16px;background:#ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff">我</div></div>';

  // ==================== MD to HTML with Containers ====================
  function mdToHtml(md,theme,withImg){
    // First pass: handle container blocks
    var containerBlocks=[];
    md=md.replace(/:::(dialogue|timeline|callout\s+\w+|quote)\s*\n([\s\S]*?)\n:::/g,function(m,type,content){
      var id='__CB'+containerBlocks.length+'__';
      containerBlocks.push({type:type.split(' ')[0],subtype:type.split(' ')[1]||'',content:content.trim()});
      return id;
    });

    var h=md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var ls=h.split('\n'),r=[],iu=false,imgIdx=1;
    var ac=theme.accent,dkBg=theme.dkBg||theme.bg;

    function cl(){if(iu){r.push('</ul>');iu=false}}

    function inl(t){
      t=t.replace(/\*\*(.+?)\*\*/g,'<strong style="'+theme.strong+'">$1</strong>');
      t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');
      t=t.replace(/`(.+?)`/g,'<code style="background:#f4f4f4;padding:1px 4px;border-radius:3px;font-size:13px">$1</code>');
      t=t.replace(/\[(.*?)\]\((.+?)\)/g,'<a href="$2" style="color:'+ac+';text-decoration:none;border-bottom:1px solid">$1</a>');
      return t;
    }

    for(var i=0;i<ls.length;i++){
      var ln=ls[i],tt=ln.trim();

      // Container block placeholder
      var cbMatch=tt.match(/^__CB(\d+)__$/);
      if(cbMatch){
        cl();
        var cb=containerBlocks[parseInt(cbMatch[1])];
        if(cb.type==='dialogue')r.push(renderDialogue(cb.content,theme));
        else if(cb.type==='timeline')r.push(renderTimeline(cb.content,theme));
        else if(cb.type==='callout')r.push(renderCallout(cb.content,cb.subtype||'info',theme));
        else if(cb.type==='quote')r.push(renderQuoteModule(cb.content,theme));
        continue;
      }

      if(/^#### (.+)/.test(tt)){cl();r.push('<h4 style="'+theme.h3+'">'+inl(RegExp.$1)+'</h4>');continue}
      if(/^### (.+)/.test(tt)){cl();r.push('<h3 style="'+theme.h3+'">'+inl(RegExp.$1)+'</h3>');continue}
      if(/^## (.+)/.test(tt)){cl();r.push('<h2 style="'+theme.h2+'">'+inl(RegExp.$1)+'</h2>');continue}
      if(/^# (.+)/.test(tt)){cl();r.push('<h1 style="'+theme.h1+'">'+inl(RegExp.$1)+'</h1>');continue}
      if(/^> (.+)/.test(tt)){cl();r.push('<blockquote style="'+theme.quote+'">'+inl(RegExp.$1)+'</blockquote>');continue}
      if(/^---$/.test(tt)){cl();r.push('<hr style="'+theme.hr+'">');continue}
      if(/^\.\.\.$/.test(tt)){cl();r.push('<div style="text-align:center;margin:24px 0;font-size:10px;letter-spacing:8px;color:#ccc">···</div>');continue}
      if(/^[-*+]\s+(.+)/.test(tt)){if(!iu){cl();r.push('<ul style="'+theme.ul+'">');iu=true}
        r.push('<li style="'+theme.li+'">'+inl(RegExp.$1)+'</li>');continue}
      if(/^(\d+)[\.\)、]\s*(.+)/.test(tt)){if(!iu){cl();r.push('<ul style="'+theme.ul+'">');iu=true}
        r.push('<li style="'+theme.li+'">'+inl(RegExp.$2)+'</li>');continue}
      if(!tt){cl();
        if(withImg&&allImages.length>0&&imgIdx<allImages.length&&selectedImages[imgIdx]&&r.length>0){
          r.push('<img src="'+allImages[imgIdx].url+'" style="'+theme.img+'">');
          imgIdx++;
        }
        r.push('<br>');continue}
      cl();r.push('<p style="'+theme.body+'">'+inl(tt)+'</p>');
    }
    cl();
    return r.join('\n');
  }

  // ==================== AI Image Gen ====================
  function extractPrompts(text){
    var ls=text.split('\n').filter(function(l){return l.trim()}),keywords=[],accent=themes.find(function(t){return t.id===currentTheme})||themes[0];
    var title=ls[0].replace(/^#+\s*/,'').replace(/[，,。！!？?；;：:、\s【】]/g,' ').trim(),tw=title.split(' ').filter(function(w){return w.length>=2}).slice(0,3);
    if(tw.length)keywords.push('Editorial illustration: '+tw.join(' ')+', '+accent.desc+' aesthetic, magazine photography style, clean composition, soft lighting, no text overlay, 16:9');
    for(var i=1;i<ls.length&&keywords.length<6;i++){
      var l=ls[i].replace(/^#+\s*/,'').replace(/[，,。！!？?；;：:、\s【】]/g,' ').trim(),ws=l.split(' ').filter(function(w){return w.length>=2}).slice(0,3);
      if(ws.length)keywords.push('Modern illustration: '+ws.join(' ')+', editorial photography, moody atmosphere, professional lighting, no text, 16:9');
    }
    return keywords.slice(0,6);
  }

  function genSingleImage(prompt,idx){return new Promise(function(resolve){
    var url='https://image.pollinations.ai/prompt/'+encodeURIComponent(prompt)+'?width=900&height=600&nologo=true&seed='+(Math.floor(Math.random()*99999));
    var img=new Image();img.onload=function(){resolve({url:url,idx:idx,prompt:prompt})};img.onerror=function(){resolve(null)};img.src=url;
    setTimeout(function(){resolve(null)},15000);
  })}

  async function generateImages(){
    var text=editor.value.trim();if(!text){toastMsg('请先输入文章内容');return}
    var prompts=extractPrompts(text);if(!prompts.length){toastMsg('无法提取关键词');return}
    genImages=prompts.map(function(p,i){return{loading:true,idx:i}});updateAllImages();renderImages();
    for(var b=0;b<prompts.length;b+=3){
      var batch=prompts.slice(b,b+3).map(function(p,i){return genSingleImage(p,b+i)}),results=await Promise.all(batch);
      for(var j=0;j<results.length;j++){var r=results[j];if(!r)continue;genImages[r.idx]={url:r.url,label:'AI配图'};if(!selectedImages[r.idx])selectedImages[r.idx]=true}
      updateAllImages();renderImages();
    }
  }

  function toastMsg(m){var t=toastEl;t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2000)}

  function checkProxy(){/* online mode: skip */}

  function showSettings(){
    var html='<div class="settings-section"><label>公众号排版助手 Pro</label><div class="hint">12套主题 · 容器模块 · AI配图 · 微信兼容修复</div></div>'+
      '<div class="settings-section"><label>使用方法</label><div class="hint">① 编辑文章 → ② 预览效果 → ③ 复制到公众号后台</div></div>'+
      '<div class="settings-section"><label>快捷键</label><div class="hint">Ctrl+S / Cmd+S 保存草稿</div></div>'+
      '<div class="proxy-status ok">线上版 · 发布走复制到剪贴板（如需 API 发布请用本地版）</div>';
    showModal('关于工具',html);
  }

  function publishToWechat(){copyWechat();}

  function syncWechat(){copyWechat();}
  // ==================== Drafts ====================
  function saveDraft(){
    var text=editor.value.trim();if(!text){toastMsg('内容为空');return}
    var drafts=JSON.parse(localStorage.getItem(DRAFT_KEY)||'[]'),title=text.split('\n')[0].replace(/^#+\s*/,'').substring(0,30)||'无标题';
    if(currentDraftId){var idx=drafts.findIndex(function(d){return d.id===currentDraftId});if(idx>=0){drafts[idx].text=text;drafts[idx].title=title;drafts[idx].words=text.replace(/\s/g,'').length;drafts[idx].time=new Date().toLocaleString();drafts[idx].theme=currentTheme}}
    else{currentDraftId='draft_'+Date.now();drafts.push({id:currentDraftId,title:title,text:text,words:text.replace(/\s/g,'').length,time:new Date().toLocaleString(),theme:currentTheme})}
    localStorage.setItem(DRAFT_KEY,JSON.stringify(drafts));toastMsg('已保存');renderDrafts();
  }
  function loadDraft(id){var d=JSON.parse(localStorage.getItem(DRAFT_KEY)||'[]').find(function(d){return d.id===id});if(d){editor.value=d.text;currentDraftId=d.id;currentTheme=d.theme||'professional-clean';renderThemes();switchTab('edit');toastMsg('已加载：'+d.title)}}
  function deleteDraft(id){var ds=JSON.parse(localStorage.getItem(DRAFT_KEY)||'[]').filter(function(d){return d.id!==id});localStorage.setItem(DRAFT_KEY,JSON.stringify(ds));if(currentDraftId===id)currentDraftId=null;renderDrafts()}
  function newDraft(){editor.value='';currentDraftId=null;switchTab('edit')}

  // ==================== Tab / Actions ====================
  function switchTab(name){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.p===name)});
    document.querySelectorAll('.panel').forEach(function(p){p.classList.toggle('active',p.id==='panel-'+name)});
    if(name==='preview')renderPreview();if(name==='draft')renderDrafts();
  }

  function toolbarAction(action){
    var ta=editor,start=ta.selectionStart,end=ta.selectionEnd,sel=ta.value.substring(start,end),before=ta.value.substring(0,start),after=ta.value.substring(end),rep=null;
    switch(action){case'h1':rep='# '+sel;break;case'h2':rep='## '+sel;break;case'h3':rep='### '+sel;break;case'bold':rep='**'+sel+'**';break;case'quote':rep='> '+sel;break;case'hr':rep='---';break;case'list':rep='- '+sel;break;case'link':rep='['+sel+'](url)';break;
      case'dialogue':rep=':::dialogue\n'+sel+'\n> 回复内容\n:::';break;case'timeline':rep=':::timeline\n**时间点** '+sel+'\n:::';break;case'callout':rep=':::callout tip\n'+sel+'\n:::';break}
    if(rep!==null){ta.value=before+rep+after;ta.focus();ta.selectionStart=start;ta.selectionEnd=start+rep.length}
  }

  function insertStyle(sid){
    var all=[].concat(textStyles,modules,decorStyles),sc=all.find(function(s){return s.id===sid});if(!sc)return;
    var ta=editor,start=ta.selectionStart,before=ta.value.substring(0,start),after=ta.value.substring(start);
    ta.value=before+'\n'+sc.md+'\n'+after;ta.focus();ta.selectionStart=ta.selectionEnd=start+sc.md.length+2;
    toastMsg('已插入：'+sc.name);switchTab('edit');
  }

  function handleUpload(e){var files=e.target.files;for(var i=0;i<files.length;i++){var f=files[i];if(!f.type.startsWith('image/'))continue;var reader=new FileReader();reader.onload=function(evt){uploadedImages.push({url:evt.target.result,label:'上传'});var idx=allImages.length;selectedImages[idx]=true;updateAllImages();renderImages()};reader.readAsDataURL(f)}}

  // ==================== Init ====================
  function init(){
    renderToolbar();renderStyleGrids();renderThemes();renderImages();
    document.getElementById('tabs').addEventListener('click',function(e){var tab=e.target.closest('.tab');if(tab)switchTab(tab.dataset.p)});
    document.getElementById('toolbar').addEventListener('click',function(e){var btn=e.target.closest('button');if(btn)toolbarAction(btn.dataset.action)});
    document.getElementById('style-grid-text').addEventListener('click',function(e){var c=e.target.closest('.style-card');if(c)insertStyle(c.dataset.sid)});
    document.getElementById('style-grid-modules').addEventListener('click',function(e){var c=e.target.closest('.style-card');if(c)insertStyle(c.dataset.sid)});
    document.getElementById('style-grid-decor').addEventListener('click',function(e){var c=e.target.closest('.style-card');if(c)insertStyle(c.dataset.sid)});
    document.getElementById('theme-grid').addEventListener('click',function(e){var c=e.target.closest('.theme-card');if(c){currentTheme=c.dataset.tid;renderThemes();toastMsg('已切换模板')}});
    document.getElementById('img-grid').addEventListener('click',function(e){var item=e.target.closest('.img-item'),del=e.target.closest('.del-btn');if(del){e.stopPropagation();var i=parseInt(del.dataset.del);delete selectedImages[i];if(i<genImages.length)genImages.splice(i,1);else uploadedImages.splice(i-genImages.length,1);updateAllImages();renderImages();return}if(item){var idx=parseInt(item.id.replace('img-item-',''));selectedImages[idx]=!selectedImages[idx];renderImages()}});
    document.getElementById('btn-gen-img').addEventListener('click',generateImages);
    document.getElementById('btn-upload-img').addEventListener('click',function(){document.getElementById('file-input').click()});
    document.getElementById('file-input').addEventListener('change',handleUpload);
    document.getElementById('btn-save').addEventListener('click',saveDraft);
    document.getElementById('draft-list').addEventListener('click',function(e){var item=e.target.closest('.draft-item'),del=e.target.closest('.d-del');if(del){e.stopPropagation();deleteDraft(del.dataset.ddel);return}if(item)loadDraft(item.dataset.did)});
    document.getElementById('btn-new-draft').addEventListener('click',newDraft);
    document.querySelector('#panel-preview .btn-copy').addEventListener('click',copyWechat);
    document.getElementById('btn-sync').addEventListener('click',syncWechat);
    document.getElementById('btn-settings').addEventListener('click',showSettings);
    document.getElementById('modal-close').addEventListener('click',closeModal);
    document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
    editor.addEventListener('keydown',function(e){if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();saveDraft()}});
    
  }
  init();
})();
</script>
</body>
</html>
